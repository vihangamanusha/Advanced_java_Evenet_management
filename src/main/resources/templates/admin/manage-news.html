
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="modal-logos">
        <img src="/images/logo2.png" alt="logo">
        <img src="/images/flogo.png" alt="logo">
    </div>

    <h2>ADMIN</h2>

    <a href="#">Dashboard</a>
    <a href="#">Booking Requests</a>
    <a href="#">Approved Events</a>
    <a th:href="@{/admin/venues}">Manage Venues</a>
    <a th:href="@{/admin/users}">Manage Users</a>
    <a th:href="@{/admin/feedback}">Feedback-list</a>
    <a href="#">Latest News</a>
    <a href="#">Calendar</a>
    <a th:href="@{/}">Logout</a>

</div>

<div class="news-manage">
    <h2>Add News</h2>

    <form action="/admin/news/save" method="post" enctype="multipart/form-data">

        <input type="text" name="title" placeholder="News Title" required>

        <textarea name="description" placeholder="Description" required></textarea>

        <input type="file" name="imageFile" required>

        <button type="submit">Save</button>

    </form>
</div>

<!-- ✅ SHOW NEWS -->
<div class="news-list">

    <h2>All News</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Image</th>
        </tr>

        <tr th:each="n : ${newsList}">
            <td th:text="${n.id}"></td>
            <td th:text="${n.title}"></td>
            <td th:text="${n.description}"></td>

            <td>
                <img th:src="@{'/uploads/' + ${n.image}}" width="100">
            </td>
        </tr>

    </table>

</div>
</body>
</html>
