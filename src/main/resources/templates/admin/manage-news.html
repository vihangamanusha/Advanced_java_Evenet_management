
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/images/logo1.png}">
    <title>Event Management System-Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="modal-logos">
        <img src="/images/logo2.png" alt="logo">
        <img src="/images/flogo.png" alt="logo">
    </div>

    <h2>ADMIN</h2>

    <a href="#">Dashboard</a>
    <a href="#">Booking Requests</a>
    <a href="#">Approved Events</a>
    <a th:href="@{/admin/venues}">Manage Venues</a>
    <a th:href="@{/admin/users}">Manage Users</a>
    <a th:href="@{/admin/feedback}">Feedback-list</a>
    <a href="#">Latest News</a>
    <a href="#">Calendar</a>
    <a th:href="@{/}">Logout</a>

</div>

<div class="news-manage">
    <h2>Add News</h2>

    <form th:action="${news != null} ? @{/admin/news/update} : @{/admin/news/save}"
          method="post"
          enctype="multipart/form-data">

        <!-- hidden id for update -->
        <input type="hidden" name="id" th:value="${news != null} ? ${news.id} : ''">

        <input type="text" name="title" placeholder="News Title"
               th:value="${news != null} ? ${news.title} : ''" required>

        <textarea name="description" placeholder="Description"
                  th:text="${news != null} ? ${news.description} : ''"></textarea>

        <input type="file" name="imageFile">

        <button type="submit"
                th:text="${news != null} ? 'Update' : 'Save'"></button>

    </form>
</div>

<!-- ✅ SHOW NEWS -->
<div class="news-list">

    <h2>All News</h2>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Image</th>
            <th>Actions</th>
        </tr>

        <tr th:each="n : ${newsList}">
            <td th:text="${n.id}"></td>
            <td th:text="${n.title}"></td>
            <td th:text="${n.description}"></td>

            <td>
                <img th:src="@{'/uploads/' + ${n.image}}" width="100">
            </td>
            <td>
                <!-- EDIT -->
                <a th:href="@{'/admin/news/edit/' + ${n.id}}">Edit</a> |

                <!-- DELETE -->
                <a th:href="@{'/admin/news/delete/' + ${n.id}}"
                   onclick="return confirm('Delete this news?')">Delete</a>
            </td>
        </tr>

    </table>

</div>
</body>
</html>
