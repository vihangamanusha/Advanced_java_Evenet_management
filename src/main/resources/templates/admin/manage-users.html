<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/images/logo1.png}">
    <title>Event Management System-Admin</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body style="background-color: #e1e0e0; ">
<!-- Sidebar -->
<div class="sidebar">
    <div class="modal-logos">
        <img src="/images/logo2.png" alt="logo">
        <img src="/images/flogo.png" alt="logo">
    </div>

    <h2>ADMIN </h2>

    <a th:href="@{/admin/dashboard}">DASHBOARD</a>
    <a href="#">CALENDER</a>
    <a th:href="@{/admin/booking-request}">BOOKING REQUEST</a>
    <a href="#">APPROVED EVENTS</a>
    <a th:href="@{/admin/venues}">MANAGE VENUES</a>
    <a th:href="@{/admin/users}">MANAGE USERS</a>
    <a th:href="@{/admin/feedback}">FEEDBACK LIST</a>
    <a th:href="@{/admin/news}">LATEST NEWS</a><br><br><br>

    <a th:href="@{/}">LOGOUT</a>

</div>


<div class="manage-user">
    <div class="border">
       <h1>MANAGE USERS</h1>
    </div>
<table border="1">
    <tr>
        <th>ID</th>
        <th>User Type</th>
        <th>Email</th>
        <th>Reg No</th>
        <th>Phone</th>
        <th>Organization</th>
        <th>Actions</th>
    </tr>

    <tr th:each="u : ${users}">
        <form action="/admin/users/update" method="post">

            <td>
                <input type="hidden" name="id" th:value="${u.id}">
                <span th:text="${u.id}"></span>
            </td>

            <td>
                <input type="text" name="usertype" th:value="${u.usertype}">
            </td>

            <td>
                <input type="text" name="email" th:value="${u.email}">
            </td>

            <td>
                <input type="text" name="registerno" th:value="${u.registerno}">
            </td>

            <td>
                <input type="text" name="phoneno" th:value="${u.phoneno}">
            </td>

            <td>
                <input type="text" name="orgname" th:value="${u.orgname}">
            </td>

            <td>
                <button type="submit" class="update-btn">Update</button>
                <a th:href="@{'/admin/users/delete/' + ${u.id}}"
                   class="btn-delete"
                   onclick="return confirm('Delete this user?')">Delete</a>
            </td>

        </form>
    </tr>

</table>
</div>
</body>
</html>
