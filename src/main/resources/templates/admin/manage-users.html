<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manage Users</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<h1>MANAGE USERS</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>User Type</th>
        <th>Email</th>
        <th>Reg No</th>
        <th>Phone</th>
        <th>Organization</th>
        <th>Actions</th>
    </tr>

    <tr th:each="u : ${users}">
        <form action="/admin/users/update" method="post">

            <td>
                <input type="hidden" name="id" th:value="${u.id}">
                <span th:text="${u.id}"></span>
            </td>

            <td>
                <input type="text" name="usertype" th:value="${u.usertype}">
            </td>

            <td>
                <input type="text" name="email" th:value="${u.email}">
            </td>

            <td>
                <input type="text" name="registerno" th:value="${u.registerno}">
            </td>

            <td>
                <input type="text" name="phoneno" th:value="${u.phoneno}">
            </td>

            <td>
                <input type="text" name="orgname" th:value="${u.orgname}">
            </td>

            <td>
                <button type="submit">Update</button>
                <a th:href="@{'/admin/users/delete/' + ${u.id}}"
                   onclick="return confirm('Delete this user?')">Delete</a>
            </td>

        </form>
    </tr>

</table>

</body>
</html>
