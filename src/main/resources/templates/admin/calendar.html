<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/images/logo1.png}">
    <title>Event Management System-Admin Calendar</title>

    <!-- FullCalendar CDN -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <link rel="stylesheet" href="/css/style.css">

</head>

<body style="background-color: #e1e0e0; font-family: Arial">


<div class="sidebar">
    <div class="modal-logos">
        <img src="/images/logo2.png" alt="logo">
        <img src="/images/flogo.png" alt="logo">
    </div>

    <h2>ADMIN </h2>

    <a th:href="@{/admin/dashboard}">DASHBOARD</a>
    <a th:href="@{/admin/calendar}">CALENDAR</a>
    <a th:href="@{/admin/booking-request}">BOOKING REQUEST</a>
    <a th:href="@{/admin/approved-events}">APPROVED EVENTS</a>
    <a th:href="@{/admin/venues}">MANAGE VENUES</a>
    <a th:href="@{/admin/users}">MANAGE USERS</a>
    <a th:href="@{/admin/feedback}">FEEDBACK LIST</a>
    <a th:href="@{/admin/news}">LATEST NEWS</a><br><br><br>

    <a th:href="@{/}">LOGOUT</a>

</div>


<div class="main-content">
    <div class="border">
        <h1>APPROVED EVENT CALENDER</h1>
    </div>
<div id="calendar"></div>

<<script>

    document.addEventListener('DOMContentLoaded', function () {
        var calendarEl = document.getElementById('calendar');

        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',

            events: '/admin/calendar-events'   // backend API
        });

        calendar.render();
    });

</script>

</div>
</body>
</html>
