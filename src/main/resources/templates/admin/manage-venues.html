<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/images/logo1.png}">
  <title>Event Management System - Admin Venues</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body style="background-color: #e1e0e0;">

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

  <div class="modal-logos">
    <img src="/images/logo2.png" alt="logo">
    <img src="/images/flogo.png" alt="logo">
  </div>

  <h2>ADMIN</h2>

  <a th:href="@{/admin/dashboard}">DASHBOARD</a>
  <a th:href="@{/admin/calendar}">CALENDAR</a>
  <a th:href="@{/admin/booking-request}">BOOKING REQUEST</a>
  <a th:href="@{/admin/approved-events}">APPROVED EVENTS</a>
  <a th:href="@{/admin/venues}">MANAGE VENUES</a>
  <a th:href="@{/admin/users}">MANAGE USERS</a>
  <a th:href="@{/admin/feedback}">FEEDBACK LIST</a>
  <a th:href="@{/admin/news}">LATEST NEWS</a>
  <br><br><br>
  <a th:href="@{/}">LOGOUT</a>

</div>

<!-- ================= MAIN CONTENT ================= -->
<div class="main-content">

  <div class="border">
    <h1>MANAGE VENUES</h1>
  </div>

  <!-- SUCCESS / ERROR -->
  <p style="color:red;" th:if="${error}" th:text="${error}"></p>
  <p style="color:green;" th:if="${success}" th:text="${success}"></p>

  <!-- ================= ADD / UPDATE FORM ================= -->
  <div class="form-box">

    <h2 th:text="${venue != null} ? 'UPDATE VENUE' : 'ADD NEW VENUE'"></h2>

    <form th:action="${venue != null} ? @{/admin/venues/update} : @{/admin/venues/save}"
          method="post"
          enctype="multipart/form-data">

      <!-- hidden id for update -->
      <input type="hidden" name="id" th:value="${venue?.id}">

      <input type="text"
             name="name"
             placeholder="Venue Name"
             th:value="${venue?.name}"
             required>

      <input type="number"
             name="capacity"
             placeholder="Capacity"
             th:value="${venue?.capacity}"
             required>

      <input type="number"
             name="price"
             placeholder="Price per Hour"
             th:value="${venue?.price}"
             required>

      <input type="file" name="imageFile">

      <!-- show existing image when editing -->
      <div th:if="${venue != null}">
        <p>Current Image:</p>
        <img th:src="@{'/images/' + ${venue.imageName}}" width="100">
      </div>

      <button type="submit"
              th:text="${venue != null} ? 'Update Venue' : 'Save Venue'">
      </button>

    </form>

  </div>

  <!-- ================= TABLE ================= -->
  <h2>ALL VENUES</h2>

  <table border="1" style="width:100%;">

    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Capacity</th>
      <th>Price</th>
      <th>Image</th>
      <th>Actions</th>
    </tr>

    <tr th:each="venue : ${venues}">

      <td th:text="${venue.id}"></td>
      <td th:text="${venue.name}"></td>
      <td th:text="${venue.capacity}"></td>
      <td th:text="${venue.price}"></td>

      <td>
        <img th:src="@{'/images/' + ${venue.imageName}}"
             width="100"
             height="70"
             style="object-fit:cover;">
      </td>

      <td>

        <!-- EDIT -->
        <a th:href="@{'/admin/venues/edit/' + ${venue.id}}"
           class="update-btn">
          Edit
        </a>

        <!-- DELETE -->
        <a th:href="@{'/admin/venues/delete/' + ${venue.id}}"
           class="btn-delete"
           onclick="return confirm('Delete this venue?')">
          Delete
        </a>

      </td>

    </tr>

  </table>

</div>

</body>
</html>
