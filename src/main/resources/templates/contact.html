<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/images/logo1.png}">
    <title>Event Management System-Contact Us</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Header -->
<div th:replace="fragments/header :: header"></div>

<section class="contact-section">

    <!-- Background overlay -->
    <div class="overlay">

        <!-- TITLE -->
        <h1>CONTACT US</h1>
        <p class="contact-desc">
            Get in touch with the Faculty of Technology Event Management Team
        </p>

        <div class="contact-container">

            <!-- LEFT SIDE (INFO) -->
            <div class="contact-info">
                <h2>Contact Information</h2>
                <p><b>📍 Address:</b> Faculty of Technology, University of Ruhuna</p>
                <p><b>📞 Phone:</b> 041 47851452</p>
                <p><b>📧 Email:</b> eventmanagement@fot.ruh.ac.lk</p>
                <p><b>🕒 Hours:</b> 8:00 AM - 5:00 PM</p>

                <!-- MAP -->
                <iframe
                        src="https://www.google.com/maps?q=Faculty%20of%20Technology%20Ruhuna&output=embed"
                        width="100%" height="200" style="border:0;">
                </iframe>
            </div>

            <!-- RIGHT SIDE (FORM) -->
            <div class="contact-form">

                <form action="/contact/save" method="post">

                    <input type="text" name="name" placeholder="Your Name" required>

                    <input type="email" name="email" placeholder="Your Email" required>

                    <input type="text" name="phone" placeholder="Phone Number">

                    <!-- Message Type -->
                    <select name="type">
                        <option>Inquiry</option>
                        <option>Complaint</option>
                        <option>Suggestion</option>
                        <option>Booking Issue</option>
                    </select>

                    <!-- Subject -->
                    <input type="text" name="subject" placeholder="Subject (Optional)">

                    <!-- Message -->
                    <textarea name="message" placeholder="Your Message" required></textarea>

                    <button type="submit">Send Message</button>

                </form>

                <!-- Success Message -->
                <p th:if="${param.success}" class="success-msg">
                    Message sent successfully!
                </p>

            </div>

        </div>

    </div>

</section>

<!-- Footer -->
<div th:replace="fragments/footer :: footer"></div>

</body>
</html>
